name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  kit:
    name: ArchiveForgeKit (build + SmokeTest)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: swift build
        run: swift build
      - name: SmokeTest
        run: swift run SmokeTest

  app:
    name: App (xcodegen + xcodebuild, both platforms)
    runs-on: macos-15
    needs: kit
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        # The default /Applications/Xcode.app on this runner resolves to
        # Swift 6.1.2, which has stricter (and, per local testing against
        # Swift 6.3.3, since-relaxed) "sending"-parameter concurrency
        # diagnostics than this code was actually verified against — see
        # the commits leading up to this one for the real errors that
        # triggered this investigation. Xcode 26.3 carries a Swift compiler
        # from the same generation as the one this code was checked
        # against locally.
        run: sudo xcode-select -s /Applications/Xcode_26.3.app
      - name: Swift version actually in use
        run: swift --version
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build macOS target
        run: |
          xcodebuild -project ArchiveForge.xcodeproj -scheme ArchiveForge-macOS \
            -destination 'platform=macOS' build \
            CODE_SIGNING_ALLOWED=NO
      - name: Build iOS target (simulator, unsigned)
        run: |
          xcodebuild -project ArchiveForge.xcodeproj -scheme ArchiveForge-iOS \
            -destination 'generic/platform=iOS Simulator' build \
            CODE_SIGNING_ALLOWED=NO
